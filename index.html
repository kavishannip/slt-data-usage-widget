<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLTDU Widget</title>
    <style>
      :root {
        --color-green: #10b981;
        --color-amber: #f59e0b;
        --color-red: #ef4444;
        --color-blue: #3b82f6;
        --radius: 16px;
      }
      
      [data-theme="dark"], :root {
        --bg-glass: rgba(20, 20, 25, 0.75);
        --border-glass: rgba(255, 255, 255, 0.1);
        --text-main: #f0f0f0;
        --text-muted: #a0a0a5;
        --popup-bg: rgba(30, 30, 35, 0.95);
        --card-bg: rgba(0, 0, 0, 0.2);
        --input-bg: rgba(0, 0, 0, 0.3);
      }
      
      [data-theme="light"] {
        --bg-glass: rgba(255, 255, 255, 0.75);
        --border-glass: rgba(0, 0, 0, 0.1);
        --text-main: #1f2937;
        --text-muted: #4b5563;
        --popup-bg: rgba(240, 240, 245, 0.95);
        --card-bg: rgba(255, 255, 255, 0.4);
        --input-bg: rgba(255, 255, 255, 0.5);
      }
      
      [data-theme="blue"] {
        --bg-glass: rgba(15, 23, 42, 0.75);
        --border-glass: rgba(56, 189, 248, 0.2);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --popup-bg: rgba(15, 23, 42, 0.95);
        --card-bg: rgba(30, 41, 59, 0.5);
        --input-bg: rgba(30, 41, 59, 0.7);
      }
      
      [data-theme="transparent"] {
        --bg-glass: transparent;
        --border-glass: transparent;
        --text-main: #ffffff;
        --text-muted: #d1d5db;
        --popup-bg: rgba(10, 10, 10, 0.9);
        --card-bg: rgba(0, 0, 0, 0.3);
        --input-bg: rgba(0, 0, 0, 0.5);
      }
      
      [data-theme="purple"] {
        --bg-glass: rgba(23, 15, 35, 0.85);
        --border-glass: rgba(168, 85, 247, 0.2);
        --text-main: #faf5ff;
        --text-muted: #c084fc;
        --popup-bg: rgba(23, 15, 35, 0.95);
        --card-bg: rgba(43, 25, 60, 0.6);
        --input-bg: rgba(59, 33, 80, 0.7);
      }
      
      [data-theme="hacker"] {
        --bg-glass: rgba(0, 15, 0, 0.85);
        --border-glass: rgba(0, 255, 0, 0.3);
        --text-main: #00ff00;
        --text-muted: #00aa00;
        --popup-bg: rgba(0, 10, 0, 0.95);
        --card-bg: rgba(0, 30, 0, 0.6);
        --input-bg: rgba(0, 40, 0, 0.7);
      }

      [data-theme="sunset"] {
        --bg-glass: rgba(40, 10, 10, 0.75);
        --border-glass: rgba(251, 146, 60, 0.2);
        --text-main: #fff7ed;
        --text-muted: #fdba74;
        --popup-bg: rgba(40, 15, 10, 0.95);
        --card-bg: rgba(60, 20, 10, 0.5);
        --input-bg: rgba(80, 30, 20, 0.7);
      }
      
      [data-theme="forest"] {
        --bg-glass: rgba(10, 30, 15, 0.75);
        --border-glass: rgba(74, 222, 128, 0.2);
        --text-main: #f0fdf4;
        --text-muted: #86efac;
        --popup-bg: rgba(10, 35, 15, 0.95);
        --card-bg: rgba(15, 45, 25, 0.5);
        --input-bg: rgba(20, 60, 35, 0.7);
      }
      
      [data-theme="ocean"] {
        --bg-glass: rgba(10, 25, 40, 0.75);
        --border-glass: rgba(45, 212, 191, 0.2);
        --text-main: #f0fdfa;
        --text-muted: #5eead4;
        --popup-bg: rgba(10, 30, 45, 0.95);
        --card-bg: rgba(15, 40, 60, 0.5);
        --input-bg: rgba(20, 50, 75, 0.7);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background-color: transparent;
        color: var(--text-main);
        overflow: hidden;
        padding: 10px;
      }

      .widget-container {
        background: var(--bg-glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-glass);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        gap: 12px;
        height: 100%;
        position: relative;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        -webkit-app-region: drag;
      }

      .header h1 {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }
      
      #package-name-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
        -webkit-app-region: no-drag;
      }

      .icon-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 4px;
        border-radius: 4px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .icon-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-main);
      }
      
      #cards-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow: hidden;
      }
      
      #cards-container.pie-mode {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: space-evenly;
        gap: 16px;
      }
      
      #cards-container::-webkit-scrollbar {
        width: 4px;
      }
      
      #cards-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
      }

      .usage-card {
        background: var(--card-bg);
        border-radius: 8px;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex-shrink: 0;
        cursor: grab;
        position: relative;
      }
      
      .usage-card.pie-card {
        width: 120px;
        align-items: center;
        gap: 4px;
      }
      
      .usage-card.dragging {
        opacity: 0.5;
        cursor: grabbing;
      }
      
      .hide-btn {
        position: absolute;
        top: 2px;
        right: 4px;
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s;
        font-size: 10px;
      }
      .usage-card:hover .hide-btn {
        opacity: 1;
      }
      .hide-btn:hover {
        color: var(--color-red);
      }
      
      .pie-chart {
        width: 70px;
        height: 70px;
        position: relative;
      }
      .pie-svg {
        transform: rotate(-90deg);
        width: 100%;
        height: 100%;
      }
      .pie-bg {
        fill: none;
        stroke: rgba(255, 255, 255, 0.05);
        stroke-width: 4;
      }
      .pie-fill {
        fill: none;
        stroke-width: 4;
        stroke-linecap: round;
        transition: stroke-dasharray 1s ease-out;
      }
      .pie-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 12px;
        font-weight: 600;
        font-family: monospace;
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
      }

      .card-title {
        font-weight: 500;
      }
      .card-value {
        font-weight: 600;
        font-family: monospace;
      }

      .progress-bar-bg {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
        height: 6px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        border-radius: 4px;
        background: var(--color-green);
        transition:
          width 0.5s ease-out,
          background-color 0.3s;
      }

      .footer {
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
        margin-top: auto;
      }

      .auth-state {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        -webkit-app-region: drag;
      }

      /* ─── Error states ─── */
      body.offline #auth-state,
      body.offline #cards-container,
      body.offline #footer-text,
      body.error-state #auth-state,
      body.error-state #cards-container,
      body.error-state #footer-text {
        display: none;
      }
      
      body.offline #offline-state { display: flex; }
      body.error-state #error-state { display: flex; }
      
      body.logged-out #auth-state {
        display: flex;
      }
      
      body.logged-out #settings-btn,
      body.logged-out #refresh-btn,
      body.logged-out #cards-container,
      body.logged-out #footer-text {
        display: none;
      }

      .login-btn {
        background: var(--color-green);
        color: #fff;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 16px;
        transition: background 0.2s;
        -webkit-app-region: no-drag;
      }
      
      .login-btn:hover {
        background: #059669;
      }

      .show {
        display: block;
      }

      .settings-popup {
        display: none;
        position: absolute;
        top: 50px;
        right: 16px;
        background: var(--popup-bg);
        border: 1px solid var(--border-glass);
        border-radius: 8px;
        padding: 16px;
        width: 260px;
        max-height: 85vh;
        overflow-y: auto;
        box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        z-index: 10;
        -webkit-app-region: no-drag;
      }
      
      .settings-popup::-webkit-scrollbar {
        width: 4px;
      }
      .settings-popup::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
      }
      
      .settings-group-title {
        font-size: 11px;
        text-transform: uppercase;
        color: var(--text-muted);
        letter-spacing: 0.5px;
        margin-top: 16px;
        margin-bottom: 8px;
        font-weight: 600;
        border-bottom: 1px solid var(--border-glass);
        padding-bottom: 4px;
      }
      
      .settings-group-title:first-of-type {
        margin-top: 0;
      }
      
      .settings-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-size: 12px;
        color: var(--text-muted);
      }
      
      .settings-section input[type="number"] {
        width: 45px;
        background: var(--input-bg);
        border: 1px solid var(--border-glass);
        color: var(--text-main);
        padding: 4px;
        border-radius: 4px;
        font-size: 11px;
        text-align: right;
      }
      
      .theme-select {
        background: var(--input-bg);
        border: 1px solid var(--border-glass);
        color: var(--text-main);
        padding: 4px;
        border-radius: 4px;
        font-size: 11px;
        width: 90px;
        cursor: pointer;
        outline: none;
      }
      
      .theme-select option {
        background: var(--popup-bg);
        color: var(--text-main);
      }
      
      .settings-divider {
        height: 1px;
        background: var(--border-glass);
        margin: 12px 0;
      }
      
      .switch {
        position: relative;
        display: inline-block;
        width: 32px;
        height: 18px;
      }
      .switch input { 
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: rgba(255, 255, 255, 0.2);
        transition: .2s;
        border-radius: 18px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 14px;
        width: 14px;
        left: 2px;
        bottom: 2px;
        background-color: var(--text-main);
        transition: .2s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: var(--color-green);
      }
      input:checked + .slider:before {
        transform: translateX(14px);
      }
      
      .settings-popup.show {
        display: block;
      }
      
      .settings-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 10px;
        color: var(--text-muted);
      }
      
      .logout-btn {
        width: 100%;
        background: rgba(239, 68, 68, 0.2);
        border: 1px solid rgba(239, 68, 68, 0.4);
        color: #fca5a5;
        padding: 6px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.2s;
      }
      
      .logout-btn:hover {
        background: rgba(239, 68, 68, 0.4);
      }
      
      .network-monitor {
        margin: 8px 12px;
        padding: 8px;
        background: var(--card-bg);
        border: 1px solid var(--border-glass);
        border-radius: 8px;
      }
      .network-stats {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 4px;
        font-family: monospace;
      }
      #network-chart {
        width: 100%;
        height: 40px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="widget-container">
      <div class="header">
        <h1 style="display:flex; align-items:center; gap:6px;">
          <span id="package-name-title">MySLT Usage</span>
          <span id="status-dot" style="display:none; width:8px; height:8px; border-radius:50%; flex-shrink:0;"></span>
        </h1>
        <div class="actions">
          <button class="icon-btn" id="refresh-btn" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
            </svg>
          </button>
          <button class="icon-btn" id="settings-btn" title="Settings">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
          <button class="icon-btn" id="close-btn" title="Close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>

      <div id="auth-state" class="auth-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" style="margin-bottom: 12px;">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <div style="color: var(--text-muted); font-size: 14px;">Not Connected</div>
        <button class="login-btn" id="login-btn">Login to MySLT</button>
      </div>

      <div id="offline-state" class="auth-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-amber)" stroke-width="1.5" style="margin-bottom: 12px;">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
        </svg>
        <div style="color: var(--text-muted); font-size: 14px; font-weight: 600; margin-bottom: 4px;">No Internet</div>
        <div style="color: var(--text-muted); font-size: 11px; margin-bottom: 12px; text-align: center;">Check your connection and try again</div>
        <button class="login-btn" id="offline-retry-btn" style="background: var(--color-amber);">Retry</button>
      </div>

      <div id="error-state" class="auth-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-red)" stroke-width="1.5" style="margin-bottom: 12px;">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <div style="color: var(--text-muted); font-size: 14px; font-weight: 600; margin-bottom: 4px;">Server Error</div>
        <div id="error-detail" style="color: var(--text-muted); font-size: 11px; margin-bottom: 12px; text-align: center;">Unable to reach SLT servers</div>
        <button class="login-btn" id="error-retry-btn" style="background: var(--color-red);">Retry</button>
      </div>

      <div id="cards-container">
        <!-- Dynamically generated cards will go here -->
      </div>
      
      <div class="footer" id="footer-text">Waiting for data...</div>
    </div>

    <script>
      const getColor = (percent) => {
        const mode = appConfig.chartColorMode || 'dynamic';
        if (mode === 'green') return "#10b981";
        if (mode === 'blue') return "#3b82f6";
        if (mode === 'purple') return "#a855f7";
        if (mode === 'orange') return "#f97316";
        if (mode === 'cyan') return "#06b6d4";
        if (mode === 'pink') return "#ec4899";
        if (mode === 'yellow') return "#eab308";
        if (mode === 'red') return "#ef4444";
        
        if (percent > 40) return "var(--color-green)";
        if (percent > 15) return "var(--color-amber)";
        return "var(--color-red)";
      };



      document.getElementById("refresh-btn").addEventListener("click", () => {
        window.api.requestRefresh();
      });

      document.getElementById("settings-btn").addEventListener("click", () => {
        window.api.openSettings();
      });

      document.getElementById("close-btn").addEventListener("click", () => {
        window.api.closeApp();
      });

      document.getElementById("login-btn").addEventListener("click", () => {
        window.api.openTokenEntry();
      });

      document.getElementById("offline-retry-btn").addEventListener("click", () => {
        document.body.classList.remove("offline");
        window.api.requestRefresh();
      });

      document.getElementById("error-retry-btn").addEventListener("click", () => {
        document.body.classList.remove("error-state");
        window.api.requestRefresh();
      });

      let appConfig = { chartMode: 'bar', chartOrder: [], hiddenCharts: [], autoResize: true };
      let activeCardsData = [];
      let lastNetworkStats = { total_rx: 0, total_tx: 0 };
      
      const formatSpeed = (bytes) => {
        if (bytes === 0) return '0 B/s';
        const k = 1024;
        const sizes = ['B/s', 'KB/s', 'MB/s', 'GB/s'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
      };
      
      const formatBytesBig = (bytes) => {
        if (!bytes || bytes === 0) return '0.0 MB';
        const k = 1024;
        const mb = bytes / (k * k);
        if (mb < 1000) return mb.toFixed(1) + ' MB';
        const gb = mb / k;
        if (gb < 1000) return gb.toFixed(2) + ' GB';
        const tb = gb / k;
        return tb.toFixed(2) + ' TB';
      };
      
      const dataThemes = {
        'default': { down: '#10b981', up: '#f59e0b', total: '#3b82f6' },
        'classic': { down: '#3b82f6', up: '#f59e0b', total: '#10b981' },
        'neon': { down: '#06b6d4', up: '#ec4899', total: '#a855f7' },
        'cyberpunk': { down: '#eab308', up: '#a855f7', total: '#ef4444' },
        'monochrome': { down: '#ffffff', up: '#9ca3af', total: '#d1d5db' },
        'candy': { down: '#ec4899', up: '#06b6d4', total: '#f472b6' }
      };
      
      const networkHistory = [];
      const MAX_HISTORY = 60;
      
      const renderNetworkChart = () => {
        const canvas = document.querySelector('.network-chart-canvas');
        if (!canvas) return;
        
        if (canvas.width !== canvas.offsetWidth) {
          canvas.width = canvas.offsetWidth;
        }
        
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        
        ctx.clearRect(0, 0, width, height);
        if (networkHistory.length === 0) return;
        
        let maxVal = 1024; // minimum 1 KB/s scale
        networkHistory.forEach(d => {
          if (d.upload > maxVal) maxVal = d.upload;
          if (d.download > maxVal) maxVal = d.download;
        });
        
        const step = width / (MAX_HISTORY - 1);
        const dtTheme = dataThemes[appConfig.dataTrackTheme] || dataThemes['default'];
        
        // Upload
        ctx.beginPath();
        ctx.strokeStyle = dtTheme.up;
        ctx.lineWidth = 1.5;
        networkHistory.forEach((d, i) => {
          const x = width - ((networkHistory.length - 1 - i) * step);
          const y = height - (d.upload / maxVal * height);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
        
        // Download
        ctx.beginPath();
        ctx.strokeStyle = dtTheme.down;
        ctx.lineWidth = 1.5;
        networkHistory.forEach((d, i) => {
          const x = width - ((networkHistory.length - 1 - i) * step);
          const y = height - (d.download / maxVal * height);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
      };

      if (window.api.onNetworkStats) {
        window.api.onNetworkStats((stats) => {
          lastNetworkStats = stats;
          const upEl = document.getElementById('upload-speed');
          const downEl = document.getElementById('download-speed');
          if (upEl) upEl.innerText = formatSpeed(stats.upload);
          if (downEl) downEl.innerText = formatSpeed(stats.download);
          
          if (stats.daily_rx !== undefined && stats.daily_tx !== undefined) {
            const dDownEl = document.getElementById('daily-download');
            const dUpEl = document.getElementById('daily-upload');
            const dTotEl = document.getElementById('daily-total');
            if (dDownEl) dDownEl.innerText = formatBytesBig(stats.daily_rx);
            if (dUpEl) dUpEl.innerText = formatBytesBig(stats.daily_tx);
            if (dTotEl) dTotEl.innerText = formatBytesBig(stats.daily_rx + stats.daily_tx);
          }
          
          networkHistory.push(stats);
          if (networkHistory.length > MAX_HISTORY) networkHistory.shift();
          renderNetworkChart();

          if (appConfig.sessionIsActive) {
            const startRx = appConfig.sessionStartTotalRx || 0;
            const startTx = appConfig.sessionStartTotalTx || 0;
            const limitBytes = (appConfig.sessionLimitMB || 0) * 1024 * 1024;
            
            if (limitBytes > 0) {
              const currentRx = stats.total_rx;
              const currentTx = stats.total_tx;
              
              const usedRx = currentRx >= startRx ? currentRx - startRx : currentRx;
              const usedTx = currentTx >= startTx ? currentTx - startTx : currentTx;
              const usedTotal = usedRx + usedTx;
              const percent = Math.min(100, (usedTotal / limitBytes) * 100);
              
              if (usedTotal >= limitBytes && !appConfig.sessionNotified) {
                window.api.showNotification({
                  title: 'Data Limit Reached',
                  body: `You have reached your custom limit of ${appConfig.sessionLimitMB} MB.`
                });
                window.api.updateSetting('sessionNotified', true);
                appConfig.sessionNotified = true;
              }
              
              const progressFill = document.querySelector('.session-progress-fill');
              const usageText = document.getElementById('session-usage-text');
              if (progressFill && usageText) {
                progressFill.style.width = percent + '%';
                progressFill.style.backgroundColor = getColor(100 - percent);
                usageText.innerText = (usedTotal / (1024*1024)).toFixed(1) + ' / ' + appConfig.sessionLimitMB + ' MB';
              }
            }
          }
        });
      }

      // Initialize settings
      window.api.getConfig().then(config => {
        if (config) {
          appConfig = { autoResize: true, chartMode: 'bar', chartOrder: [], hiddenCharts: [], ...config };
          if (!appConfig.hiddenCharts) appConfig.hiddenCharts = [];
          if (!appConfig.chartOrder) appConfig.chartOrder = [];
          
          if (config.theme) {
            document.documentElement.setAttribute('data-theme', config.theme);
          }
          if (activeCardsData.length > 0) renderCards();
        }
      });
      
      window.api.onSettingUpdated((data) => {
        appConfig[data.key] = data.value;
        if (data.key === 'theme') {
          document.documentElement.setAttribute('data-theme', data.value);
        } else if (data.key === 'autoResize' && !data.value) {
          document.getElementById('cards-container').style.overflowY = 'auto';
          document.getElementById('cards-container').style.paddingRight = '4px';
        }
        renderCards();
      });

      let draggedCard = null;

      function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.usage-card:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
          const box = child.getBoundingClientRect();
          const offset = y - box.top - box.height / 2;
          if (offset < 0 && offset > closest.offset) {
            return { offset: offset, element: child };
          } else {
            return closest;
          }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
      }

      const createCard = (d) => {
        let { name, used, limit, remaining, percent, unit, type } = d;
        if (type !== 'network' && type !== 'session' && type !== 'daily_device') {
          if (remaining === null || remaining === undefined) remaining = limit - used;
          if (percent === null || percent === undefined) percent = limit > 0 ? (remaining / limit) * 100 : 0;
          if (remaining < 0) { remaining = 0; percent = 0; }
        }

        const card = document.createElement("div");
        card.className = "usage-card";
        card.draggable = true;
        card.dataset.name = name;
        if (appConfig.chartMode === 'pie' && type !== 'network' && type !== 'session' && type !== 'daily_device') card.classList.add('pie-card');

        card.addEventListener('dragstart', (e) => {
          draggedCard = card;
          setTimeout(() => card.classList.add('dragging'), 0);
        });
        
        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
          draggedCard = null;
          
          // Save new order
          const container = document.getElementById("cards-container");
          const newOrder = Array.from(container.children).map(c => c.dataset.name);
          appConfig.chartOrder = newOrder;
          window.api.updateSetting('chartOrder', newOrder);
        });
        
        card.addEventListener('dragover', (e) => {
          e.preventDefault();
          const container = document.getElementById("cards-container");
          const afterElement = getDragAfterElement(container, e.clientY);
          if (afterElement == null) {
            container.appendChild(draggedCard);
          } else {
            container.insertBefore(draggedCard, afterElement);
          }
        });

        const color = type === 'network' ? '#3b82f6' : (type === 'session' ? 'var(--color-blue)' : (type === 'daily_device' ? 'var(--color-green)' : getColor(percent)));

        if (type === 'session') {
          card.innerHTML = `
            <button class="hide-btn" title="Hide">✕</button>
            <div class="card-header" style="margin-bottom: 2px;">
              <span class="card-title">${name}</span>
            </div>
            <div style="display:flex; gap: 8px; margin: 4px 0;">
              <input type="number" id="session-limit-input" style="flex: 1; background: var(--input-bg); border: 1px solid var(--border-glass); color: var(--text-main); font-size: 11px; padding: 2px 4px; border-radius: 4px;" placeholder="MB" value="${appConfig.sessionLimitMB || 500}">
              <button id="session-toggle-btn" style="background: ${appConfig.sessionIsActive ? 'var(--color-red)' : 'var(--color-green)'}; color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 32px;">
                ${appConfig.sessionIsActive 
                  ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"></rect></svg>'
                  : '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>'
                }
              </button>
            </div>
            <div class="progress-bar-bg" style="height: 6px; margin-top: 4px;">
              <div class="progress-bar-fill session-progress-fill" style="width: 0%; background-color: var(--color-blue)"></div>
            </div>
            <div style="font-size: 10px; color: var(--text-muted); text-align: right; margin-top: 2px;">
              <span id="session-usage-text">0.0 / ${appConfig.sessionLimitMB || 500} MB</span>
            </div>
          `;
          
          setTimeout(() => {
            const toggleBtn = card.querySelector('#session-toggle-btn');
            const input = card.querySelector('#session-limit-input');
            
            if (appConfig.sessionIsActive) {
              input.disabled = true;
            }
            
            toggleBtn.onclick = () => {
              if (appConfig.sessionIsActive) {
                // Stop it
                appConfig.sessionIsActive = false;
                window.api.updateSetting('sessionIsActive', false);
                
                input.disabled = false;
                toggleBtn.style.background = 'var(--color-green)';
                toggleBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
                
                const progressFill = card.querySelector('.session-progress-fill');
                if (progressFill) {
                  progressFill.style.width = '0%';
                  progressFill.style.backgroundColor = 'var(--color-blue)';
                }
                card.querySelector('#session-usage-text').innerText = '0.0 / ' + (appConfig.sessionLimitMB || 500) + ' MB';
              } else {
                // Play it
                const mb = parseInt(input.value) || 0;
                if (mb <= 0) return;
                
                appConfig.sessionLimitMB = mb;
                appConfig.sessionIsActive = true;
                appConfig.sessionStartTotalRx = lastNetworkStats.total_rx || 0;
                appConfig.sessionStartTotalTx = lastNetworkStats.total_tx || 0;
                appConfig.sessionNotified = false;
                
                window.api.updateSetting('sessionLimitMB', mb);
                window.api.updateSetting('sessionIsActive', true);
                window.api.updateSetting('sessionStartTotalRx', appConfig.sessionStartTotalRx);
                window.api.updateSetting('sessionStartTotalTx', appConfig.sessionStartTotalTx);
                window.api.updateSetting('sessionNotified', false);
                
                input.disabled = true;
                toggleBtn.style.background = 'var(--color-red)';
                toggleBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"></rect></svg>';
              }
            };
            
            input.onchange = (e) => {
              const mb = parseInt(e.target.value) || 0;
              appConfig.sessionLimitMB = mb;
              window.api.updateSetting('sessionLimitMB', mb);
              card.querySelector('#session-usage-text').innerText = '0.0 / ' + mb + ' MB';
            };
          }, 0);
        } else if (type === 'daily_device') {
          const dtTheme = dataThemes[appConfig.dataTrackTheme] || dataThemes['default'];
          card.innerHTML = `
            <button class="hide-btn" title="Hide">✕</button>
            <div class="card-header" style="margin-bottom: 6px;">
              <span class="card-title">${name}</span>
            </div>
            <div style="display:flex; flex-direction:column; gap:6px;">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="color:var(--text-muted); font-size:11px;">Total Consumption</span>
                <span style="font-size:16px; font-weight:bold; font-family:monospace;">
                  <span style="color:${dtTheme.total}; font-size:14px; margin-right:4px;">⬍</span><span id="daily-total">${formatBytesBig((lastNetworkStats.daily_rx || 0) + (lastNetworkStats.daily_tx || 0))}</span>
                </span>
              </div>
              <div style="display:flex; justify-content:space-between; font-size:12px; font-family:monospace; margin-top:2px;">
                <div style="display:flex; align-items:center; gap:4px;">
                  <span style="color:${dtTheme.down}">▼</span>
                  <span id="daily-download" style="font-weight:600;">${formatBytesBig(lastNetworkStats.daily_rx || 0)}</span>
                </div>
                <div style="display:flex; align-items:center; gap:4px;">
                  <span style="color:${dtTheme.up}">▲</span>
                  <span id="daily-upload" style="font-weight:600;">${formatBytesBig(lastNetworkStats.daily_tx || 0)}</span>
                </div>
              </div>
            </div>
          `;
        } else if (type === 'network') {
          const dtTheme = dataThemes[appConfig.dataTrackTheme] || dataThemes['default'];
          card.innerHTML = `
            <button class="hide-btn" title="Hide">✕</button>
            <div class="card-header" style="margin-bottom: 2px;">
              <span class="card-title">${name}</span>
            </div>
            <div class="network-stats" style="display:flex; justify-content:space-between; font-size:10px; color:var(--text-muted); font-family:monospace;">
              <div><span style="color:${dtTheme.down}">▼</span> <span id="download-speed">${formatSpeed(lastNetworkStats.download || 0)}</span></div>
              <div><span style="color:${dtTheme.up}">▲</span> <span id="upload-speed">${formatSpeed(lastNetworkStats.upload || 0)}</span></div>
            </div>
            <canvas class="network-chart-canvas" height="30" style="width:100%; display:block; margin-top:2px;"></canvas>
          `;
        } else if (appConfig.chartMode === 'pie') {
          const c = 2 * Math.PI * 16;
          const dashArray = `${(Math.max(0, Math.min(100, percent)) / 100) * c} ${c}`;
          card.innerHTML = `
            <button class="hide-btn" title="Hide">✕</button>
            <div style="font-size: 11px; font-weight: 500; text-align: center; margin-bottom: 4px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${name}">${name}</div>
            <div class="pie-chart">
              <svg class="pie-svg" viewBox="0 0 36 36">
                <circle class="pie-bg" cx="18" cy="18" r="16"></circle>
                <circle class="pie-fill" cx="18" cy="18" r="16" stroke="${color}" stroke-dasharray="${dashArray}"></circle>
              </svg>
              <div class="pie-text" style="color: ${color}">${Math.round(percent)}%</div>
            </div>
            <div style="font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 4px;">
              ${parseFloat(remaining).toFixed(1)} / ${parseFloat(limit).toFixed(1)} ${unit}
            </div>
          `;
        } else {
          card.innerHTML = `
            <button class="hide-btn" title="Hide">✕</button>
            <div class="card-header">
              <span class="card-title">${name}</span>
              <span class="card-value">${parseFloat(remaining).toFixed(1)} / ${parseFloat(limit).toFixed(1)} ${unit || 'GB'}</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" style="width: ${Math.max(0, Math.min(100, percent))}%; background-color: ${color}"></div>
            </div>
            <div style="font-size: 10px; color: var(--text-muted); text-align: right; margin-top: -4px;">
              Used: ${parseFloat(used).toFixed(1)} ${unit || 'GB'}
            </div>
          `;
        }
        
        card.querySelector('.hide-btn').onclick = (e) => {
          e.stopPropagation();
          if (!appConfig.hiddenCharts) appConfig.hiddenCharts = [];
          if (!appConfig.hiddenCharts.includes(name)) {
            appConfig.hiddenCharts.push(name);
            window.api.updateSetting('hiddenCharts', appConfig.hiddenCharts);
            renderCards();
          }
        };

        return card;
      };

      const renderCards = () => {
        const container = document.getElementById("cards-container");
        container.innerHTML = "";
        
        if (appConfig.chartMode === 'pie') {
          container.classList.add('pie-mode');
        } else {
          container.classList.remove('pie-mode');
        }
        
        if (!appConfig.hiddenCharts) appConfig.hiddenCharts = [];
        if (!appConfig.chartOrder) appConfig.chartOrder = [];
        
        let visibleData = activeCardsData.filter(d => !appConfig.hiddenCharts.includes(d.name));
        
        visibleData.sort((a, b) => {
          let ixA = appConfig.chartOrder.indexOf(a.name);
          let ixB = appConfig.chartOrder.indexOf(b.name);
          if (ixA === -1) ixA = 999;
          if (ixB === -1) ixB = 999;
          return ixA - ixB;
        });

        visibleData = visibleData.slice(0, 6);
        
        visibleData.forEach(d => {
          container.appendChild(createCard(d));
        });
        
        // Immediately render chart to avoid 1-second delay
        renderNetworkChart();
        
        if (appConfig.autoResize !== false) {
          document.getElementById('cards-container').style.overflowY = 'hidden';
          document.getElementById('cards-container').style.paddingRight = '0';
          
          const effectiveCount = Math.max(1, visibleData.length);
          let height = 110; // Accurate base height for paddings, header, and footer
          
          if (appConfig.chartMode === 'bar') {
            height += (effectiveCount * 70) + ((effectiveCount - 1) * 12); 
          } else {
            const rows = Math.ceil(effectiveCount / 2);
            height += (rows * 126) + ((rows - 1) * 16);
          }
          
          window.api.resizeWindow(320, height);
        } else {
          document.getElementById('cards-container').style.overflowY = 'auto';
          document.getElementById('cards-container').style.paddingRight = '4px';
        }
      };

      window.api.onData((data) => {
        document.body.classList.remove('logged-out', 'offline', 'error-state');
        
        if (data && data.dataBundle) {
          const bundle = data.dataBundle;
          const pkgInfo = bundle.my_package_info;
          
          if (pkgInfo && pkgInfo.package_name) {
            let pkgName = pkgInfo.package_name;
            const dot = document.getElementById("status-dot");
            dot.style.display = "inline-block";
            
            if (bundle.status === "NORMAL") {
              dot.style.background = "var(--color-green)";
              dot.title = "Speed is Normal";
            } else if (bundle.status) {
              dot.style.background = "var(--color-red)";
              dot.title = "Speed Issue";
              pkgName = bundle.status; // Shows LOW PAY BILL etc.
            }
            
            document.getElementById("package-name-title").innerText = pkgName;
          }

          activeCardsData = [];
          
          if (pkgInfo && pkgInfo.usageDetails && Array.isArray(pkgInfo.usageDetails)) {
            pkgInfo.usageDetails.forEach((detail) => {
              let detailName = detail.name;
              if (detailName === 'Total (Standard + Free)') detailName = 'Total';
              activeCardsData.push({
                name: detailName, used: detail.used, limit: detail.limit, remaining: detail.remaining, percent: detail.percentage, unit: detail.volume_unit
              });
            });
          }

          const summaryKeys = ['bonus_data_summary', 'free_data_summary', 'vas_data_summary', 'extra_gb_data_summary'];
          summaryKeys.forEach(key => {
            const summary = bundle[key];
            if (summary && summary.limit !== undefined && summary.used !== undefined) {
              const name = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()).replace(' Summary', '');
              activeCardsData.push({
                name: name, used: summary.used, limit: summary.limit, remaining: null, percent: null, unit: summary.volume_unit
              });
            }
          });
          
          activeCardsData.push({ name: 'Device Daily Usage', type: 'daily_device' });
          activeCardsData.push({ name: 'Network Traffic', type: 'network' });
          activeCardsData.push({ name: 'Set Data Limit', type: 'session' });
          
          renderCards();
          
          document.getElementById("footer-text").innerText =
            `Reported: ${bundle.reported_time || pkgInfo?.reported_time || "Unknown"}`;
        } else {
          const now = new Date();
          document.getElementById("footer-text").innerText =
            `Updated: ${now.toLocaleTimeString()}`;
        }
      });

      window.api.onAuthExpired(() => {
        document.body.classList.remove("offline", "error-state");
        document.body.classList.add("logged-out");
        window.api.closeSettings();
      });

      window.api.onFetchError((err) => {
        if (err.type === 'offline') {
          // Always show offline screen — stale data is misleading
          document.body.classList.remove('logged-out', 'error-state');
          document.body.classList.add('offline');
          return;
        }

        // For server errors: only replace UI if there's no data yet
        const hasData = document.querySelectorAll('#cards-container .usage-card').length > 0;
        if (hasData) {
          const footer = document.getElementById('footer-text');
          if (footer) footer.innerText = `Error — showing last data`;
          return;
        }

        document.body.classList.remove('logged-out', 'offline', 'error-state');
        const detail = document.getElementById('error-detail');
        if (detail) detail.innerText = err.status ? `Server responded with error ${err.status}` : 'Unable to reach SLT servers';
        document.body.classList.add('error-state');
      });
    </script>
  </body>
</html>
